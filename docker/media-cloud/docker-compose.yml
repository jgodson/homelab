services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      TZ: "${TZ:-America/Edmonton}"
    ports:
      - "8096:8096"
      - "7359:7359/udp"
    volumes:
      - "${JELLYFIN_CONFIG_ROOT:-/mnt/storage/jellyfin}/config:/config"
      - "${JELLYFIN_CONFIG_ROOT:-/mnt/storage/jellyfin}/cache:/cache"
      - "${MEDIA_ROOT:-/mnt/storage/media}:/media:ro"

  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-v2}
    container_name: immich_server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "2283:2283"
    volumes:
      - "${UPLOAD_LOCATION:-/mnt/storage/immich/upload}:/data"
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - immich-redis
      - immich-database
    healthcheck:
      disable: false

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v2}
    container_name: immich_machine_learning
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - "${IMMICH_MODEL_CACHE_LOCATION:-/mnt/storage/immich/model-cache}:/cache"
    healthcheck:
      disable: false

  immich-redis:
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    container_name: immich_redis
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping || exit 1

  immich-database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    container_name: immich_postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_USER: "${DB_USERNAME:-postgres}"
      POSTGRES_DB: "${DB_DATABASE_NAME:-immich}"
      POSTGRES_INITDB_ARGS: "--data-checksums"
      DB_STORAGE_TYPE: "${DB_STORAGE_TYPE:-HDD}"
    volumes:
      - "${DB_DATA_LOCATION:-/mnt/storage/immich/postgres}:/var/lib/postgresql/data"
    shm_size: 128mb
    healthcheck:
      disable: false
