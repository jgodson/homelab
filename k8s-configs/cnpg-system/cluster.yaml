# CloudNativePG PostgreSQL Cluster
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql-pg
  namespace: postgresql
spec:
  instances: 2  # Primary + 1 replica for HA

  # Let CNPG manage the PodDisruptionBudget so node drains cannot evict the
  # primary when the replica is unavailable.
  enablePDB: true
  
  # Use CloudNativePG's PostgreSQL 16 image (UID 26, compatible with operator)
  # Official postgres:16 uses UID 999 which causes "user does not exist" errors
  imageName: ghcr.io/cloudnative-pg/postgresql:16-bookworm
  
  # Storage configuration
  storage:
    storageClass: ceph-rbd
    size: 50Gi
  
  # Resource limits
  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1"
  
  # Bootstrap configuration
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
  
  # Enable superuser access
  enableSuperuserAccess: true
  
  # Monitoring
  monitoring:
    enablePodMonitor: false
  
  # Backup configuration - continuous WAL archiving + scheduled base backups to MinIO
  backup:
    barmanObjectStore:
      destinationPath: "s3://cnpg-backups/"
      endpointURL: "http://192.168.1.252:9000"
      s3Credentials:
        accessKeyId:
          name: cnpg-minio-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-minio-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
    retentionPolicy: "30d"

  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      work_mem: "4MB"
      maintenance_work_mem: "64MB"
